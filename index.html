<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; worker-src 'self' blob:;" />
    <title>VerityPDF</title>
    <style>
      /* 骨架屏 - React 挂载前显示 */
      body { margin: 0; background: #1a1a2e; }
      .skeleton-root {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        height: 100vh; width: 100vw; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #e0e0e0; user-select: none;
      }
      .skeleton-logo {
        font-size: 32px; font-weight: 700; letter-spacing: 2px; margin-bottom: 8px;
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .skeleton-subtitle { font-size: 13px; color: #888; margin-bottom: 32px; }
      .skeleton-spinner {
        width: 36px; height: 36px; border: 3px solid rgba(59,130,246,0.2);
        border-top-color: #3b82f6; border-radius: 50%;
        animation: skeleton-spin 0.8s linear infinite;
      }
      .skeleton-hint { font-size: 12px; color: #666; margin-top: 16px; }
      .skeleton-bar {
        width: 200px; height: 3px; background: rgba(255,255,255,0.08);
        border-radius: 2px; margin-top: 12px; overflow: hidden;
      }
      .skeleton-bar-fill {
        width: 30%; height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6);
        border-radius: 2px; animation: skeleton-progress 1.5s ease-in-out infinite;
      }
      @keyframes skeleton-spin { to { transform: rotate(360deg); } }
      @keyframes skeleton-progress {
        0% { width: 10%; margin-left: 0; }
        50% { width: 40%; margin-left: 30%; }
        100% { width: 10%; margin-left: 90%; }
      }
    </style>
    <!-- OpenCV.js 图像预处理引擎 (可选，用于 OCR 增强) -->
    <script>
      window.__opencvReady = false;
      var script = document.createElement('script');
      script.src = '/opencv/opencv.js';
      script.async = true;
      script.onload = function() { window.__opencvReady = true; window.dispatchEvent(new Event('opencv-ready')); };
      script.onerror = function() { console.warn('[OpenCV] Failed to load opencv.js, OCR preprocessing will be disabled'); };
      document.head.appendChild(script);
    </script>
  </head>
  <body>
    <div id="root">
      <div class="skeleton-root">
        <div class="skeleton-logo">VerityPDF</div>
        <div class="skeleton-subtitle">专业 PDF 批注工具</div>
        <div class="skeleton-spinner"></div>
        <div class="skeleton-hint">正在加载应用...</div>
        <div class="skeleton-bar"><div class="skeleton-bar-fill"></div></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
